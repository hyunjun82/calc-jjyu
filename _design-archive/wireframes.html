<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>대한민국 모든 계산기 — 와이어프레임 5종</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="wireframe.css" />
<style>
  html, body { margin: 0; padding: 0; background: #ededea; }
  body { font-family: 'Gaegu', system-ui; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script src="data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="variant-a.jsx"></script>
<script type="text/babel" src="variant-b.jsx"></script>
<script type="text/babel" src="variant-c.jsx"></script>
<script type="text/babel" src="variant-d.jsx"></script>
<script type="text/babel" src="variant-e.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const { DesignCanvas, DCSection, DCArtboard } = window;
  return (
    <DesignCanvas title="대한민국 모든 계산기 · 와이어프레임 5종"
      subtitle="Editorial(B) → Sidebar(A) → Inline(E) 우선 권장. 회색조 · 손그림 · 구조 탐색 단계.">
      <DCSection id="hero" title="와이어프레임 변형 5종 (회색조 · 손그림)">
        <DCArtboard id="wf-b" label="B · Editorial  ★ 권장" width={1280} height={1700}>
          <window.VariantB />
        </DCArtboard>
        <DCArtboard id="wf-a" label="A · Classic Sidebar" width={1280} height={1600}>
          <window.VariantA />
        </DCArtboard>
        <DCArtboard id="wf-e" label="E · Inline TOP 1 (2-col)" width={1280} height={1700}>
          <window.VariantE />
        </DCArtboard>
        <DCArtboard id="wf-d" label="D · Search-first" width={1280} height={1500}>
          <window.VariantD />
        </DCArtboard>
        <DCArtboard id="wf-c" label="C · Dense Index" width={1280} height={1500}>
          <window.VariantC />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
